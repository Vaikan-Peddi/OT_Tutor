services:
  - type: web
    name: ot-tutor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ACTIVE_PROVIDER
        value: groq
      - key: ACTIVE_MODEL
        value: llama-3.1-8b-instant
      - key: VISION_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false        # paste in Render dashboard
      - key: GEMINI_API_KEY
        sync: false        # paste in Render dashboard
