services:
  - type: web
    name: ot-tutor-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ACTIVE_PROVIDER
        sync: false
      - key: ACTIVE_MODEL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
